<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des students</title>
</head>

<body>
    <main role="main" class="container">
        <table class="table">
            <thead style="background-color: #ddd; font-weight: bold;">
                <tr>
                    <td class="header">Id</td>
                    <td class="header">Name</td>
                    <td class="header">Age</td>
                    <td class="header">Bio</td>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.id}}</td>
                    <td>{{ student.name}}</td>
                    <td>{{ student.age }}</td>
                    <td>{{ student.bio }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>

</html>
